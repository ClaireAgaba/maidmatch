<!doctype html>
<html>

<head>
  <title>Project Title</title>
  <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://use.fontawesome.com/releases/v5.2.0/css/all.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/frame.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/controls.css" media="screen" rel="stylesheet" type="text/css" />
  <link href="css/custom.css" media="screen" rel="stylesheet" type="text/css" />
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700' rel='stylesheet' type='text/css'>
  <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,700" rel="stylesheet">
  <link rel="stylesheet" href="maid_match\css\contact.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="js/menu.js"></script>
  <style>
    .menu-embedding {
      color: rgb(67, 181, 216) !important;
      opacity: 1 !important;
      font-weight: 700 !important;
    }
  </style>
</head>

<body class="force-no-scroll" style="background-color: aqua;">
  <div class="menu-container"></div>
  <div class="iframe-container">
    <main>
      <section class="contact-section">
          <h1>Contact Us</h1>
          <p>Have questions or feedback? We'd love to hear from you.</p>
          
          <form id="contact-form">
              <label for="name">Name:</label>
              <input type="text" id="name" name="name" required>
              
              <label for="email">Email:</label>
              <input type="email" id="email" name="email" required>
              
              <label for="message">Message:</label>
              <textarea id="message" name="message" rows="4" required></textarea>
              
              <button type="submit">Submit</button>
          </form>
      </section>
      
      <section class="info-section">
          <div class="info-item">
              <h2>Customer Feedback</h2>
              <p>Read what our customers are saying about us:</p>
              <div class="feedback">
                  <!-- Customer feedback will be displayed here using JavaScript -->
              </div>
          </div>
          
          <div class="info-item">
              <h2>Maid Match </h2>
              <address>
                  Makerere University<br>
                  Wandegeya, Kampala<br>
                  Uganda
              </address>
          </div>
          
          <div class="info-item">
              <h2>Contact Information</h2>
              <p>Email: <a href="mailto:info@example.com">maidmatch@info.com</a></p>
              <p>Telephone: <a href="tel:+123456789">+256 456 789</a></p>
          </div>
      </section>
  </main>

  </div>
</body>

</html>
